<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brasa's Chat — Assistente Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f12;
      --surface:   #1a1a22;
      --surface2:  #24242f;
      --border:    #2e2e3d;
      --accent:    #ff6b35;
      --accent2:   #ff9d6c;
      --user-bg:   #ff6b35;
      --bot-bg:    #24242f;
      --text:      #f0f0f4;
      --muted:     #7878a0;
      --radius:    16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
    }

    /* ── layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-info h1 { font-size: 17px; font-weight: 700; }
    .header-info p  { font-size: 13px; color: var(--muted); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── bubbles ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeUp .25s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--accent); }
    .msg.bot  .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ── tables ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13.5px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background: var(--surface2);
      color: var(--accent);
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* ── typing indicator ── */
    .typing { display: flex; gap: 5px; padding: 14px 18px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── input area ── */
    .input-area {
      padding: 16px 20px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14.5px;
      resize: none;
      min-height: 48px;
      max-height: 180px;
      outline: none;
      transition: border-color .2s;
      line-height: 1.5;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #c0392b);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    #sendBtn:hover:not(:disabled) { transform: scale(1.05); }
    #sendBtn:disabled { opacity: .45; cursor: not-allowed; }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
    }

    /* ── welcome card ── */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 32px 24px;
    }
    .welcome .fire { font-size: 52px; margin-bottom: 16px; }
    .welcome h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">🥩</div>
    <div class="header-info">
      <h1>Brasa's Assistente Virtual</h1>
      <p><span class="status-dot"></span>Online — Churrascaria Brasa's</p>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="fire">🔥</div>
      <h2>Bem-vindo ao Assistente da Brasa's!</h2>
      <p>Olá! Sou o assistente virtual da Brasa's Churrascaria.<br/>
         Posso te ajudar com orçamentos, cardápios e muito mais.<br/>
         Diga olá e vamos começar! 🍖</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Digite sua mensagem…"
        rows="1"
        autofocus
      ></textarea>
      <button id="sendBtn" title="Enviar (Enter)">➤</button>
    </div>
    <p class="hint">Pressione <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para nova linha</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const welcome    = document.getElementById('welcome');

  let conversationId = null;
  let waiting = false;

  /* ── auto-resize textarea ── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  /* ── Enter to send ── */
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  sendBtn.addEventListener('click', handleSend);

  function handleSend() {
    const text = inputEl.value.trim();
    if (!text || waiting) return;
    send(text);
  }

  /* ── append a bubble ── */
  function appendMessage(role, text) {
    if (welcome) welcome.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    if (role === 'bot' && typeof marked !== 'undefined') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollBottom();
    return bubble;
  }

  /* ── typing indicator ── */
  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── send request ── */
  async function send(text) {
    waiting = true;
    sendBtn.disabled = true;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    showTyping();

    try {
      const body = { UserMessage: text };
      if (conversationId) body.id = conversationId;

      const API_URL = window.location.port === '8080'
        ? '/api/chat'
        : 'http://localhost:8080/api/chat';

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error(`Erro HTTP ${res.status}`);

      const data = await res.json();
      conversationId = data.id;

      hideTyping();
      appendMessage('bot', data.outputLLM);
    } catch (err) {
      hideTyping();
      appendMessage('bot', '⚠️ Ops! Não consegui conectar com o servidor. Verifique se a aplicação está rodando.');
      console.error(err);
    } finally {
      waiting = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
